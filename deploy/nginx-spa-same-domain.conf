# Same domain: static SPA + Laravel API on one host (e.g. tagpila.com).
#
# Requirements:
# - All Laravel traffic (including Google OAuth) must hit public/index.php.
# - OAuth routes live at /api/auth/google/redirect and /api/auth/google/callback
#   so one `location ^~ /api/` block is enough (no separate /auth/ rule).
#
# Example pattern (adjust paths and PHP socket):
#
#   root /var/www/tagpila/backend/public;
#   index index.php;
#
#   location ^~ /api/ {
#       try_files $uri $uri/ /index.php?$query_string;
#   }
#
#   location / {
#       try_files $uri $uri/ /index.html;
#   }
#
# If you instead use `location / { try_files ... /index.php }` for everything,
# ensure unknown paths still reach Laravel for /api/* before falling through to SPA.
