# Fix HTTP 413 "Request Entity Too Large" on banner / file uploads.
#
# Merge this into your nginx server (or http) block for tagpila.com, then reload nginx:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Default client_max_body_size is often 1m — too small for 5 MB hero images.

client_max_body_size 12M;

# Also ensure PHP allows the same (php.ini or pool .conf), e.g.:
#   upload_max_filesize = 12M
#   post_max_size = 12M
